<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Projeto Cachorro</title>

    <link rel="stylesheet" href="styles/style.css">

</head>

<body>
    <h2>Cadastro para Adoção de Cães</h2>
    <html lang="en">

    <head>

        <form id="formAdocao">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
            <br>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Email@gmail.com">
            <br>

            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(XX)XXXX-XXXX">
            <br>

            <label for="CPF">CPF</label>
            <input type="text" id="CPF" placeholder="000-000-000-00">
            <br>

            <label for="idade">Idade</label>
            <input type="text" id="idade" placeholder="Ex 18">
            <br>

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" placeholder="Joiville-SC">
            <br>

            <label for="moradia">Moradia</label>
            <select name="moradia" id="moradia">
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>
            <br>

            <label for="pet">Já teve pet antes?</label>
            <input type="radio" name="pet" value="sim">Sim
            <input type="radio" name="pet" value="nao">Não
            <br>


            <label for="quintal">Possui Quintal?</label>
            <input type="radio" name="quintal" value="sim">Sim
            <input type="radio" name="quintal" value="nao">Não
            <br>

            <label for="tempo">Quanto tempo o animal ficará sozinho por dia?</label><br>
            <input type="text" id="tempo" placeholder="Ex 4horas">
            <br>

            <label for="motivo">Motivo da adoção</label><br>
            <textarea id="motivo" name="motivo" rows="2" cols="35">
            </textarea>
            <br>

            <legend>Termo de responsabilidade</legend>

            <input type="checkbox" id="termos" name="termos" checked />
            <label for="termos">Aceito</label><br>

            <button type="submit">Enviar</button>

        </form>

        <div id="resultado"></div>

        <script src="scripts/script.js"></script>

</body>

</html>
